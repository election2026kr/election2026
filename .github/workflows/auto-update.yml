name: 선거 데이터 자동 업데이트
on:
  schedule:
    # 한국시간 기준: 오전 6시, 9시, 12시, 15시, 18시, 21시 (UTC -9시간)
    - cron: '0 21 * * *'
    - cron: '0 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:  # 수동 실행 버튼
jobs:
  update-election-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 의존성 설치
        run: pip install google-genai requests beautifulsoup4 lxml
      - name: 선거 데이터 자동 업데이트 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_update.py
      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "election-bot"
          git config user.email "bot@election2026.aphrocaptain.com"
          git add data/candidates.json
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "auto: 선거 데이터 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
