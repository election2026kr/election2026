name: 선관위 데이터 자동 업데이트

on:
  schedule:
    # 매일 오전 1시 (KST = UTC+9, 즉 UTC 16:00)
    - cron: '0 16 * * *'
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  update-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 선관위 API 데이터 수집
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: |
          python3 scripts/fetch_candidates.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/candidates.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 선관위 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
