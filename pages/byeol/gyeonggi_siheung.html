<script>
(function() {
  const BYEOL_ID = 'gyeonggi-siheung';

  const PARTY_COLOR = {
    minjoo:  { text: '#6ea8fe',  border: '#1a6fd4',  avatarCls: 'avatar-minjoo',  barCls: 'bar-minjoo',  barColor: '#1a6fd4' },
    gukmin:  { text: '#ff8080',  border: '#e83a42',  avatarCls: 'avatar-gukmin',  barCls: 'bar-gukmin',  barColor: '#e83a42' },
    joguk:   { text: '#7eb3ff',  border: '#1a4fa8',  avatarCls: 'avatar-joguk',   barCls: 'bar-joguk',   barColor: '#1a4fa8' },
    gaehyuk: { text: '#f97316',  border: '#e85d00',  avatarCls: 'avatar-gaehyuk', barCls: 'bar-gaehyuk', barColor: '#e85d00' },
    jinbo:   { text: '#a78bfa',  border: '#7c3aed',  avatarCls: 'avatar-jinbo',   barCls: '',            barColor: '#7c3aed' },
    musosok: { text: '#cbd5e1',  border: '#94a3b8',  avatarCls: 'avatar-indep',   barCls: 'bar-indep',   barColor: '#94a3b8' }
  };

  const VERDICT_MAP = {
    minjoo:  { label: '민주 우세', cls: 'badge-minjoo' },
    gukmin:  { label: '국힘 우세', cls: 'badge-gukmin' },
    joguk:   { label: '조국 우세', cls: 'badge-joguk' },
    close:   { label: '초접전',    cls: 'badge-close' },
    pending: { label: '판세 미정', cls: 'badge-pending' }
  };

  function getInitial(name) {
    if (!name) return '?';
    return name.charAt(0);
  }

  function renderPage(item) {
    const verdict = VERDICT_MAP[item.verdict] || { label: '', cls: '' };
    const hasPct = item.candidates.some(c => c.pct != null);

    // 제목 및 메타 업데이트
    document.title = `${item.region} 보궐선거 | 2026 지방선거`;
    document.getElementById('page-title').textContent = `${item.region} 보궐선거 | 2026 지방선거`;
    document.getElementById('breadcrumb-region').textContent = item.region;

    // 후보 카드 생성
    const colCount = item.candidates.length;
    let candCards = '';
    const chartLabels = [];
    const chartData = [];
    const chartColors = [];

    item.candidates.forEach(c => {
      const p = PARTY_COLOR[c.party] || { text: '#aaa', border: '#555', avatarCls: '', barCls: '', barColor: '#555' };
      const initial = getInitial(c.name);
      const pct = c.pct != null ? c.pct : null;
      const pctHtml = pct != null ? `<div style="font-size:24px;font-weight:900;color:${p.text};">${pct}%</div>` : `<div style="font-size:13px;color:#8b949e;margin-top:4px;">${c.status}</div>`;
      const barHtml = pct != null ? `<div class="bar-wrap" style="margin-top:8px;"><div class="bar-bg"><div class="bar-fill ${p.barCls}" style="width:${pct}%;height:10px;border-radius:5px;${p.barCls ? '' : 'background:' + p.barColor + ';'}"></div></div></div>` : '';
      const avatarStyle = c.party === 'musosok' ? `background:#888;color:#fff;width:52px;height:52px;font-size:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;` : `width:52px;height:52px;font-size:18px;`;
      const avatarCls = c.party === 'musosok' ? '' : `candidate-avatar ${p.avatarCls}`;

      candCards += `<div class="cand-detail-card" style="border-left:4px solid ${p.border};">
        <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;">
          <div class="${avatarCls}" style="${avatarStyle}">${initial}</div>
          <div style="font-size:16px;font-weight:900;">${c.name}</div>
          <div style="font-size:11px;color:${p.text};font-weight:700;">${c.partyName} · ${c.status}</div>
          ${pctHtml}
        </div>
        ${barHtml}
        <a href="https://info.nec.go.kr" target="_blank" class="modal-link" style="margin-top:10px;display:block;font-size:11px;text-align:center;">🔗 선관위 정보</a>
      </div>`;

      if (pct != null) {
        chartLabels.push(`${c.name}(${c.partyName.replace('더불어민주당','민주').replace('국민의힘','국힘').replace('조국혁신당','조국').replace('무소속','무소속')})`);
        chartData.push(pct);
        chartColors.push(p.barColor);
      }
    });

    const gridCols = colCount >= 3 ? '1fr 1fr 1fr' : colCount === 2 ? '1fr 1fr' : '1fr';

    let surveySection = '';
    if (hasPct) {
      surveySection = `<div class="section" style="padding:20px;margin-bottom:20px;">
        <h2 class="section-title" style="font-size:16px;margin-bottom:16px;">📊 여론조사 추이</h2>
        <div class="notice-box" style="margin-bottom:16px;">선거여론조사심의위원회 등록 조사 기준. 수치는 참고용이며 실제 결과와 다를 수 있습니다.<br><strong>조사일:</strong> ${item.surveyDate || '미상'}</div>
        <canvas id="surveyChart" style="max-height:240px;"></canvas>
      </div>`;
    } else {
      surveySection = `<div class="notice-box" style="margin-bottom:20px;">📅 공천 확정 후 여론조사 예정</div>`;
    }

    const verdictBadge = verdict.label ? `<span class="verdict-badge ${verdict.cls}" style="font-size:14px;padding:6px 14px;">${verdict.label}</span>` : '';

    document.getElementById('page-content').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
        <h1 style="font-size:22px;font-weight:900;margin:0;">📋 ${item.region}</h1>
        ${verdictBadge}
      </div>
      <div class="notice-box" style="margin-bottom:20px;">
        📌 <strong>보궐선거 사유:</strong> ${item.reason}
      </div>
      <div style="display:grid;grid-template-columns:${gridCols};gap:12px;margin-bottom:24px;">
        ${candCards}
      </div>
      ${surveySection}
    `;

    // Chart.js 렌더링
    if (hasPct && chartData.length > 0) {
      const ctx = document.getElementById('surveyChart');
      if (ctx) {
        new Chart(ctx.getContext('2d'), {
          type: 'bar',
          data: {
            labels: chartLabels,
            datasets: [{
              label: '지지율 (%)',
              data: chartData,
              backgroundColor: chartColors,
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.raw + '%' } } },
            scales: {
              x: { ticks: { color: '#c9d1d9', font: { family: 'Noto Sans KR' } }, grid: { display: false } },
              y: { min: 0, max: 60, ticks: { color: '#8b949e', callback: v => v + '%' }, grid: { color: '#21262d' } }
            }
          }
        });
      }
    }
  }

  // JSON 로드 (상대 경로: pages/byeol/ 기준 ../../data/candidates.json)
  fetch('../../data/candidates.json')
    .then(r => r.json())
    .then(data => {
      const item = (data.byeol || []).find(b => b.id === BYEOL_ID);
      if (item) {
        renderPage(item);
      } else {
        document.getElementById('page-content').innerHTML = '<div style="text-align:center;padding:60px 0;color:#8b949e;">데이터를 찾을 수 없습니다.</div>';
      }
    })
    .catch(err => {
      console.error('데이터 로드 실패:', err);
      document.getElementById('page-content').innerHTML = '<div style="text-align:center;padding:60px 0;color:#8b949e;">데이터를 불러오지 못했습니다.</div>';
    });

  // Kakao SDK 초기화
  if (window.Kakao && !window.Kakao.isInitialized()) {
    window.Kakao.init('6f395c68ef01442dd59afb6ed01c9b86');
  }
})();
</script>
